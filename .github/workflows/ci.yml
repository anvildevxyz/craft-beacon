name: CI

on:
  pull_request:
  push:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        php: ['8.2', '8.4']
    steps:
      - uses: actions/checkout@v7

      - uses: shivammathur/setup-php@v2
        with:
          php-version: ${{ matrix.php }}
          extensions: mbstring, pdo, pdo_mysql, intl, gd
          tools: composer:v2

      - name: Cache Composer
        uses: actions/cache@v5
        with:
          path: ~/.composer/cache
          key: ${{ runner.os }}-php${{ matrix.php }}-composer-${{ hashFiles('composer.lock') }}

      - name: Install dependencies
        run: composer install --prefer-dist --no-progress

      - name: ECS
        run: vendor/bin/ecs check

      - name: PHPStan
        run: vendor/bin/phpstan analyse --memory-limit=1G

      - name: PHPUnit
        run: vendor/bin/phpunit

  bench:
    runs-on: ubuntu-latest
    needs: test
    steps:
      - uses: actions/checkout@v7

      - uses: shivammathur/setup-php@v2
        with:
          php-version: '8.2'
          extensions: mbstring, pdo, pdo_mysql, intl, gd
          tools: composer:v2

      - name: Install dependencies
        run: composer install --prefer-dist --no-progress

      # CraftBootstrapBench requires a fully initialized Craft project
      # (DB, project config, generated CustomFieldBehavior) and is deferred
      # to beta integration test setup per README. Only run pure-PHP benches.
      - name: Run pure-PHP benchmarks
        run: vendor/bin/phpbench run tests/bench/RedirectMatcherBench.php --report=aggregate
